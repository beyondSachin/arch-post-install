# ─────────────────────────────────────────────
# Hyprland Profile — Arch Post-Install
# Packages, services, and dotfiles for Hyprland
# ─────────────────────────────────────────────

packages:
  pacman:
    # Compositor & ecosystem
    - hyprland
    - hyprpaper
    - hypridle
    - hyprlock
    - xdg-desktop-portal-hyprland

    # Bar & notifications
    - waybar
    - dunst

    # Launcher
    - rofi-wayland

    # Terminal
    - kitty
    - alacritty

    # File manager
    - nautilus
    - yazi
    - superfile
    - ffmpegthumbnailer   # yazi thumbnails
    - poppler             # yazi pdf preview

    # Editor
    - neovim

    # Multiplexer
    - zellij

    # Git & Docker
    - lazygit
    - docker
    - lazydocker

    # Shell tools
    - atuin
    - starship
    - eza
    - bat
    - ripgrep
    - fd
    - fzf
    - zoxide

    # Browser
    - chromium

    # Media
    - mpv
    - imv
    - feh
    - evince

    # Screenshot
    - grim
    - slurp
    - wl-clipboard
    - cliphist

    # System tools
    - polkit-kde-agent
    - kwallet
    - kwallet-pam
    - kwalletmanager
    - bluez
    - bluez-utils
    - brightnessctl
    - playerctl
    - wireplumber
    - pipewire
    - pipewire-pulse
    - pipewire-alsa
    - nodejs
    - npm

    # Network & DNS
    - trippy
    - dog
    - dust

    # Theming
    - qt5ct
    - kvantum
    - papirus-icon-theme
    - adwaita-icon-theme
    - nwg-look

    # Fonts
    - ttf-jetbrains-mono-nerd
    - ttf-font-awesome
    - noto-fonts
    - noto-fonts-emoji

    # CLI utilities
    - impala              # network TUI
    - bluetui             # bluetooth TUI

  aur:
    - grimblast-git
    - wiremix             # audio TUI
    - hyprshutdown        # graceful shutdown
    - posting
    - vfox
    - calcure

  flatpak: []

services:
  - bluetooth
  - NetworkManager
  - pipewire
  - pipewire-pulse
  - wireplumber
  - docker

dotfiles:
  - hypr
  - waybar
  - kitty
  - alacritty
  - rofi
  - yazi
  - nvim
  - fish
  - zellij
  - fastfetch
  - ohmyposh
  - superfile
  - calcure

executables:
  - hypr/scripts
  - waybar/scripts