# ─────────────────────────────────────────────
# Hyprland Profile — Arch Post-Install
# Packages, services, and dotfiles for Hyprland
# ─────────────────────────────────────────────

packages:
  pacman:
    # Compositor & ecosystem
    - hyprland
    - hyprpaper
    - hypridle
    - hyprlock
    - xdg-desktop-portal-hyprland

    # Bar & notifications
    - waybar
    - dunst

    # Launcher
    - rofi-wayland

    # Terminal
    - kitty

    # File manager
    - nautilus
    - yazi
    - ffmpegthumbnailer   # yazi thumbnails
    - poppler             # yazi pdf preview

    # Editor
    - neovim

    # Multiplexer
    - zellij

    # Browser
    - chromium

    # Media
    - mpv
    - imv
    - feh
    - evince

    # Screenshot
    - grim
    - slurp
    - wl-clipboard

    # System tools
    - polkit-kde-agent
    - bluez
    - bluez-utils
    - brightnessctl
    - playerctl
    - wireplumber
    - pipewire
    - pipewire-pulse
    - pipewire-alsa

    # Theming
    - qt5ct
    - kvantum
    - papirus-icon-theme
    - adwaita-icon-theme
    - nwg-look

    # Fonts
    - ttf-jetbrains-mono-nerd
    - ttf-font-awesome
    - noto-fonts
    - noto-fonts-emoji

    # CLI utilities
    - impala              # network TUI
    - bluetui             # bluetooth TUI

  aur:
    - grimblast-git
    - wiremix             # audio TUI
    - hyprshutdown        # graceful shutdown

services:
  - bluetooth
  - NetworkManager
  - pipewire
  - pipewire-pulse
  - wireplumber

dotfiles:
  - theme
  - hypr
  - waybar
  - kitty
  - rofi
  - yazi
  - nvim
  - zellij