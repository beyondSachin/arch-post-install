###################
### KEYBINDINGS ###
###################

$mainMod = SUPER # Sets "Windows" key as main modifier

# --- Core Apps ---
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, B, exec, $browser
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, SPACE, exec, rofi -show drun
bind = $mainMod, M, exec, ~/.config/hypr/scripts/floating_menu.sh

# --- Window Management ---
bind = $mainMod, Q, killactive,
bind = $mainMod, C, killactive,  # fallback for consistency
bind = $mainMod SHIFT, C, killactive,
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod ALT, F, fullscreen, 1 # Maximize
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, Z, layoutmsg, togglesplit # togglesplit dwindle
bind = $mainMod, T, pin

# --- Desktop & Session ---
bind = $mainMod, Escape, exec, ~/.config/waybar/scripts/power_menu.sh
bind = $mainMod SHIFT, Q, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = CONTROL ALT, Delete, exec, hyprctl clients -j | jq -r '.[].address' | xargs -I {} hyprctl dispatch closewindow address:{}
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, N, exec, ~/.config/hypr/scripts/toggle_theme.sh

# --- Move Focus (Vim-style & Arrows) ---
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# --- Move Windows (Vim-style & Arrows) ---
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# --- Switch between windows ---
bind = $mainMod, Tab, cyclenext,
bind = $mainMod, Tab, bringactivetotop,

# --- Workspaces ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# --- Move active window to a workspace ---
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# --- Special Workspace (Scratchpad) ---
bind = $mainMod, W, togglespecialworkspace, magic
bind = $mainMod SHIFT, W, movetoworkspace, special:magic

# --- Scroll through Workspaces ---
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# --- Resize Windows (Submap) ---
bind=ALT, R, submap, resize
submap=resize
binde=, l, resizeactive, 20 0
binde=, h, resizeactive, -20 0
binde=, k, resizeactive, 0 -20
binde=, j, resizeactive, 0 20
binde=, right, resizeactive, 20 0
binde=, left, resizeactive, -20 0
binde=, up, resizeactive, 0 -20
binde=, down, resizeactive, 0 20
bind=, escape, submap, reset
bind=, return, submap, reset
submap=reset

# --- Mouse Bindings ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Screenshots ---
bind = , Print, exec, grimblast --notify copysave area
bind = ALT, Print, exec, grimblast --notify copysave active
bind = SHIFT, Print, exec, grimblast --notify copysave output
bind = $mainMod SHIFT, S, exec, grimblast --notify copysave area
