###################                                                                                                   
### KEYBINDINGS ###                                                                                                   
###################                                                                                                   
                                                                                                                      
# See https://wiki.hypr.land/Configuring/Keywords/                                                                    
$mainMod = SUPER # Sets "Windows" key as main modifier                                                                

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more     

## Hot Keys

## Programs
bind = $mainMod, RETURN, exec, $terminal   
bind = $mainMod, B, exec, $browser                                  
bind = $mainMod, N, exec, ~/.config/hypr/scripts/toggle_theme.sh
bind = $mainMod, M, exec, ~/.config/hypr/scripts/floating_menu.sh

## Window Management
bind = $mainMod ALT, F, fullscreen, 1 # Full width/height (Maximise)

## Brightness Control
bindel = $mainMod, F1, exec, brightnessctl set 5%-
bindel = $mainMod, F2, exec, brightnessctl set 5%+