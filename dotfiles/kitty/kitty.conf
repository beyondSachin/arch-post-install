# Kitty config — Generated by theme-changer (do not edit directly)
# For custom colors: edit ~/.config/kitty/kitty.conf
include theme.conf

# Font
font_family JetBrainsMono Nerd Font
bold_italic_font auto
font_size 11.0

# Window
window_padding_width 14
hide_window_decorations yes
confirm_os_window_close 0

# Modern window styling
window_border_width 1pt
window_border_radius 4
active_border_color #6d45ff
inactive_border_color #1e2024

# Keybindings
map ctrl+insert copy_to_clipboard
map shift+insert paste_from_clipboard

# Allow remote access
allow_remote_control yes

# Aesthetics
cursor_shape block
cursor_blink_interval 0
shell_integration no-cursor
enable_audio_bell no

# Minimal Tab bar styling
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# Scrollback
scrollback_lines 10000
scrollback_pager less --chop-long-lines

# Mouse
mouse_hide_wait 3.0
url_style nounderline
copy_on_select yes
paste_action paste_and_execute

# Performance
repaint_delay 10
input_delay 3

# Cursor beam style
cursor_style beam
cursor_beam_thickness 1.5

# Tab bar colors
active_tab_background #6d45ff
active_tab_foreground #d3dae3
inactive_tab_background #1e2024
inactive_tab_foreground #666a73